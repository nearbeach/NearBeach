version: 2.1

jobs:
  build-and-test-backend:
    docker:
      - image: cimg/python:3.12.0
    steps:
      - checkout
      - restore_cache:
          key: deps1-{{ .Branch }}-{{ checksum "requirements.txt" }}
      - run:
          name: Building Virtual Environment
          command: |
            python3 -m venv venv
            . venv/bin/activate
            pip install -r requirements-dev.txt
            pip install coverage
      - save_cache:
          key: deps1-{{ .Branch }}-{{ checksum "requirements.txt" }}
          paths:
            - "venv"
      - run:
          name: Running Tests
          command: |
            . venv/bin/activate
            CI=true coverage run --branch \
              --omit='venv/*,NearBeach/tests/*,NearBeach/migrations/*,*/__init__.py,manage.py,settings.py,NearBeach/admin.py,NearBeach/apps.py' \
              manage.py test
            coverage report
            coverage html
      - store_artifacts: # Upload test summary for display in Artifacts: https://circleci.com/docs/2.0/artifacts/
          path: ~/project/htmlcov
          destination: tr1
  build-and-test-frontend:
    docker:
      - image: cimg/node:23.4.0
    steps:
      - checkout
      - run:
          name: Install system dependencies for Playwright
          command: |
            sudo apt-get update
            sudo apt-get install -y libnspr4 libnss3 libgconf-2-4 libxss1 libappindicator1 libindicator7 libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf1.2-0 libglib2.0-0 libgtk-3-0 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxinerama1 libxrandr2 libxrender1 libxss1 libxtst6 fonts-liberation xdg-utils
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Update NPM
          command: "sudo npm install -g npm"
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install npm Dependencies
          command: "npm install && npx playwright install"
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      - run:
          name: Run Vitest Unit Tests for VueJS
          command: "npm run test:unit"
      - store_artifacts:
          path: ~/project/coverage
          destination: tr2

workflows:
  build:
    jobs:
      - build-and-test-backend
      - build-and-test-frontend
