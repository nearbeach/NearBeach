version: 2.1

jobs:
  build-and-test-backend:
    docker:
      - image: cimg/python:3.12.0
    steps:
      - checkout
      - restore_cache:
          key: deps1-{{ .Branch }}-{{ checksum "requirements.txt" }}
      - run:
          name: Building Virtual Environment
          command: |
            python3 -m venv venv
            . venv/bin/activate
            pip install -r requirements-dev.txt
            pip install coverage
      - save_cache:
          key: deps1-{{ .Branch }}-{{ checksum "requirements.txt" }}
          paths:
            - "venv"
      - run:
          name: Running Tests
          command: |
            . venv/bin/activate
            CI=true coverage run --branch \
              --omit='venv/*,NearBeach/tests/*,NearBeach/migrations/*,*/__init__.py,manage.py,settings.py,NearBeach/admin.py,NearBeach/apps.py' \
              manage.py test
            coverage report
            coverage html
      - store_artifacts: # Upload test summary for display in Artifacts: https://circleci.com/docs/2.0/artifacts/
          path: ~/project/htmlcov
          destination: tr1
      - run:
          name: Build Local Database
          command: |
            . venv/bin/activate
            python3 ./manage.py migrate
            python3 ./manage.py loaddata ./NearBeach/fixtures/NearBeach_basic_setup.json
      - run:
          name: Running Django Server
          command: |
            . venv/bin/activate
            python3 ./manage.py runserver
  build-and-test-frontend:
    docker:
      - image: cimg/node:21.2.0
    steps:
      - checkout
      - run:
          name: Update NPM
          command: "sudo npm install -g npm"
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install npm Dependencies
          command: "npm install --legacy-peer-deps"
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      - run:
          name: Run Vitest Unit Tests for VueJS
          command: npm run unit-test
      - store_artifacts:
          path: ~/project/coverage
          destination: tr2
  test-frontend-e2e:
    docker:
      - image: cimg/node:21.2.0
    steps:
      - checkout
      - run:
          name: Update NPM
          command: "sudo npm install -g npm"
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install npm Dependencies
          command: "npm install --legacy-peer-deps"
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      - run:
          name: Playwrite Install
          command: npx playwright install
      - run:
          name: Run E2E Tests
          command: npm run e2e

workflows:
  build:
    jobs:
      - build-and-test-backend
      - build-and-test-frontend
      - test-frontend-e2e
